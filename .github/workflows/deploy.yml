name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.10.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            NEXT_PUBLIC_ADMIN_API_URL=https://chalkak.asuscomm.com/admin/api
            NEXT_PUBLIC_KAKAO_MAP_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_MAP_KEY }}

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_SSH_PORT }}
          username: ${{ secrets.NAS_SSH_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin
            echo ${{ secrets.GH_PAT }} | docker login ghcr.io -u ${{ secrets.USER }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            cd ${{ secrets.NAS_DEPLOY_PATH }}
            docker compose up -d chalkak-admin-web
